name: Feature request
description: Propose a focused improvement to giv.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is currently difficult, slow, or missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want, including keybindings or UI placement if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or different approaches did you consider?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples from other tools, or repository scenarios that clarify the request.
