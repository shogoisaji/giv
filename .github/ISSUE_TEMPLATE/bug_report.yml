name: Bug report
description: Report a reproducible problem in giv.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please include enough detail for someone else to reproduce it from a clean checkout or a normal installed binary.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps, repository state, and key presses if this is a UI issue.
      placeholder: |
        1. Run `giv` in ...
        2. Press ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: giv version
      description: Run `giv debug version`.
      placeholder: "giv 0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system and terminal
      placeholder: "macOS 15.5, iTerm2 3.5"
    validations:
      required: true
  - type: input
    id: git
    attributes:
      label: Git version
      description: Run `git --version`.
      placeholder: "git version 2.49.0"
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, repository shape, or anything unusual about the working tree.
